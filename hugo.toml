baseURL = "https://blog.ajomathew.dev/"
locale = "en-us"
title = "Ajo's Blog"

[module]
  [[module.imports]]
    path = "github.com/hugo-toha/toha/v4"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
  pagerSize = 5

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  description = "Cloud, DevOps, Automation, Security. Everything I have experienced and experimented on cloud and deployments."
  avatar = "/assets/images/bio-gi.png"
  menu_item_separator = " - "

  # Enable and configure blog posts
  [params.features]
    [params.features.blog]
      enable = true
    [params.features.darkMode]
      enable = true
    [params.features.readingTime]
      enable = true
    [params.features.breadcrumbs]
      enable = true
    [params.features.tags]
      enable = true
      on_card = true
    [params.features.recentPosts]
      enable = true
      showSummary = true
      maxPosts = 5
      showReadTime = true
    [params.features.toc]
      enable = true
      keepStatic = false
      auto = false

  [params.author]
    name = "Ajo Mathew"
    image = "/assets/images/bio-gi.png"
    headline = "Cloud and DevOps Architect"
    bio = "I am a seasoned Cloud and DevOps Architect with over 12 years of experience designing, deploying, and managing cloud infrastructure on Azure and AWS. My expertise includes cloud automation, DevOps best practices, Infrastructure as Code (IaC), and CI/CD pipeline development, enabling organizations to enhance scalability, performance, and operational efficiency. Passionate about building resilient cloud solutions, I thrive on optimizing workflows and driving innovation in cloud environments."
    [[params.author.links]]
      label = "GitHub"
      icon = "fab fa-github"
      url = "https://github.com/ajo.mathew"
    [[params.author.links]]
      label = "Twitter"
      icon = "fab fa-twitter"
      url = "https://twitter.com/ajo_mathew"
    [[params.author.links]]
      label = "LinkedIn"
      icon = "fab fa-linkedin"
      url = "https://www.linkedin.com/in/ajomathiu/"

[[params.social]]
  icon = "brand-github"
  name = "GitHub"
  url = "https://github.com/ajo.mathew"

[[params.social]]
  icon = "brand-x"
  name = "Twitter"
  url = "https://twitter.com/ajo_mathew"

[[params.social]]
  icon = "brand-linkedin"
  name = "LinkedIn"
  url = "https://www.linkedin.com/in/ajomathiu/"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 1

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 2

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 3

[[menu.main]]
